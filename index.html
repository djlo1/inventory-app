const uid=()=>Math.random().toString(36).slice(2,10);
const toDay=()=>new Date().toISOString().split('T')[0];
const fmtD=(d)=>new Date(d+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
const mKey=(d)=>d.slice(0,7);
const nowM=()=>mKey(toDay());
const getSt=(a)=>a.min===0?'ok':a.stock===0?'empty':a.stock<a.min?'low':'ok';
const stStyle=(s)=>({ok:{c:C.ok,bg:'#EEF8F2'},low:{c:C.warn,bg:'#FFF4EE'},empty:{c:C.danger,bg:'#FFF0EE'}}[s]);
const stLabel=(s)=>({ok:'En stock',low:'Faible',empty:'Épuisé'}[s]);

function Badge({s}){
  const {c,bg}=stStyle(s);
  return h('span',{style:{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:20,background:bg,color:c}},stLabel(s));
}

function ArtCard({art,onClick}){
  const s=getSt(art);const{c,bg}=stStyle(s);
  return h('div',{onClick:()=>onClick(art),style:{background:'#fff',borderRadius:12,padding:'11px 14px',marginBottom:7,cursor:'pointer',border:`1px solid ${s==='ok'?C.border:c+'44'}`,display:'flex',alignItems:'center',gap:10}},
    h('div',{style:{minWidth:38,height:38,borderRadius:8,background:bg,display:'flex',alignItems:'center',justifyContent:'center'}},
      h('span',{style:{fontSize:8,color:c,fontWeight:700,textAlign:'center',lineHeight:1.2,padding:'0 2px'}},art.code)
    ),
    h('div',{style:{flex:1,minWidth:0}},
      h('div',{style:{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},art.nom),
      h('div',{style:{fontSize:11,color:C.muted,marginTop:1}},art.sym)
    ),
    h('div',{style:{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}},
      h('div',{style:{fontSize:20,fontWeight:700,color:c,lineHeight:1}},art.stock),
      h(Badge,{s})
    )
  );
}

function Stat({label,val,sub,color}){
  return h('div',{style:{background:'#fff',borderRadius:12,padding:'13px 14px',border:`1px solid ${C.border}`,flex:1}},
    h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:3}},label),
    h('div',{style:{fontSize:24,fontWeight:700,color:color||C.navy,lineHeight:1}},val),
    sub&&h('div',{style:{fontSize:10,color:C.muted,marginTop:2}},sub)
  );
}

function Dashboard({arts,mvts,asm,setScr}){
  const alerts=arts.filter(a=>getSt(a)!=='ok');
  const tot=arts.reduce((s,a)=>s+a.stock,0);
  const mm=mvts.filter(m=>mKey(m.date)===nowM());
  const sortM=mm.filter(m=>m.type==='sortie').reduce((s,m)=>s+m.qty,0);
  const entM=mm.filter(m=>m.type==='entree').reduce((s,m)=>s+m.qty,0);
  const rec=mvts.slice(0,6);
  return h('div',{style:{padding:'16px 14px 0'}},
    h('div',{style:{marginBottom:18}},
      h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase'}},'\u25C6 INVENTORY'),
      h('div',{style:{fontSize:22,fontWeight:800,color:C.navy,lineHeight:1.1,marginTop:2}},asm.nom||'Mon Assemblée'),
      h('div',{style:{fontSize:12,color:C.muted,marginTop:3}},(asm.ville?asm.ville+' · ':'')+'Tableau de bord')
    ),
    h('div',{style:{display:'flex',gap:8,marginBottom:8}},
      h(Stat,{label:'Publications en stock',val:tot,sub:'total'}),
      h(Stat,{label:'Alertes',val:alerts.length,sub:'à traiter',color:alerts.length>0?C.danger:C.ok})
    ),
    h('div',{style:{display:'flex',gap:8,marginBottom:18}},
      h(Stat,{label:'Sorties ce mois',val:sortM,color:C.gold}),
      h(Stat,{label:'Reçus ce mois',val:entM,color:C.navy})
    ),
    alerts.length>0&&h('div',{style:{marginBottom:18}},
      h('div',{style:{fontSize:12,fontWeight:600,color:C.text,marginBottom:8,display:'flex',alignItems:'center',gap:5}},
        h('span',{style:{color:C.warn,fontSize:14}},'⚠'),` Alertes stock (${alerts.length})`),
      ...alerts.slice(0,4).map(a=>{
        const s=getSt(a);const{c,bg}=stStyle(s);
        return h('div',{key:a.id,style:{background:bg,borderRadius:10,padding:'9px 12px',marginBottom:5,display:'flex',alignItems:'center',border:`1px solid ${c}33`}},
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:12,fontWeight:500,color:C.text}},a.nom),
            h('div',{style:{fontSize:10,color:C.muted}},a.code)
          ),
          h('div',{style:{fontSize:17,fontWeight:700,color:c,marginRight:8}},a.stock),
          h(Badge,{s})
        );
      }),
      alerts.length>4&&h('div',{onClick:()=>setScr('stock'),style:{textAlign:'center',fontSize:12,color:C.gold,fontWeight:500,padding:'6px',cursor:'pointer'}},`Voir ${alerts.length-4} autre(s) →`)
    ),
    rec.length>0&&h('div',{style:{marginBottom:16}},
      h('div',{style:{fontSize:12,fontWeight:600,color:C.text,marginBottom:8}},'Activité récente'),
      ...rec.map(m=>h('div',{key:m.id,style:{background:'#fff',borderRadius:10,padding:'9px 12px',marginBottom:5,display:'flex',alignItems:'center',gap:8,border:`1px solid ${C.border}`}},
        h('div',{style:{width:28,height:28,borderRadius:7,background:m.type==='sortie'?'#FFF4EE':'#EEF8F2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}},
          m.type==='sortie'?'↓':'↑'
        ),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontSize:12,fontWeight:500,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.artNom),
          h('div',{style:{fontSize:10,color:C.muted}},fmtD(m.date)+(m.personne?' · '+m.personne:'')+(m.langue&&m.langue!=='Français'?' · '+m.langue:''))
        ),
        h('span',{style:{fontSize:13,fontWeight:700,color:m.type==='sortie'?C.warn:C.ok}},(m.type==='sortie'?'-':'+')+m.qty)
      ))
    ),
    rec.length===0&&h('div',{style:{textAlign:'center',padding:'30px 16px',color:C.muted}},
      h('div',{style:{fontSize:36,marginBottom:8}},'📦'),
      h('div',{style:{fontSize:13}},'Commencez par configurer vos publications dans Stock, puis enregistrez des mouvements.')
    )
  );
}

function Stock({arts,onArt}){
  const [cat,setCat]=useState('Bibles');
  const [q,setQ]=useState('');
  const filtered=arts.filter(a=>q?a.nom.toLowerCase().includes(q.toLowerCase())||a.code.includes(q)||a.sym.toLowerCase().includes(q.toLowerCase()):a.cat===cat);
  const alertCnt=(c)=>arts.filter(a=>a.cat===c&&getSt(a)!=='ok').length;
  return h('div',null,
    h('div',{style:{padding:'14px 14px 8px',background:C.bg,position:'sticky',top:0,zIndex:10}},
      h('div',{style:{fontSize:18,fontWeight:700,color:C.navy,marginBottom:10}},'Stock des publications'),
      h('div',{style:{position:'relative',marginBottom:8}},
        h('span',{style:{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:C.muted,fontSize:14}},'🔍'),
        h('input',{value:q,onChange:e=>setQ(e.target.value),placeholder:'Rechercher par nom, code, symbole...',style:{width:'100%',padding:'9px 10px 9px 32px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,outline:'none'}}),
        q&&h('span',{onClick:()=>setQ(''),style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',cursor:'pointer',color:C.muted,fontSize:14}},'✕')
      ),
      !q&&h('div',{style:{display:'flex',gap:5,overflowX:'auto',paddingBottom:2}},
        ...CATS.map(c=>{
          const al=alertCnt(c);
          return h('button',{key:c,onClick:()=>setCat(c),style:{padding:'5px 11px',borderRadius:20,fontSize:11,fontWeight:500,whiteSpace:'nowrap',cursor:'pointer',background:cat===c?C.navy:'#fff',color:cat===c?'#fff':C.text,border:cat===c?'none':`1px solid ${C.border}`,position:'relative'}},
            c,
            al>0&&h('span',{style:{position:'absolute',top:-4,right:-4,width:13,height:13,background:C.danger,borderRadius:'50%',fontSize:8,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}},al)
          );
        })
      )
    ),
    h('div',{style:{padding:'6px 14px'}},
      q&&h('div',{style:{fontSize:11,color:C.muted,marginBottom:6}},`${filtered.length} résultat(s)`),
      filtered.length===0&&h('div',{style:{textAlign:'center',padding:'30px',color:C.muted,fontSize:13}},'Aucune publication trouvée'),
      ...filtered.map(a=>h(ArtCard,{key:a.id,art:a,onClick:onArt}))
    )
  );
}

  const [q,setQ]=useState('');
  const [sel,setSel]=useState(null);
  const [qty,setQty]=useState(1);
  const [per,setPer]=useState('');
  const [langue,setLangue]=useState('Français');
  const [dt,setDt]=useState(toDay());
  const [ok,setOk]=useState(false);
  const [err,setErr]=useState('');

function Inventaire({arts,mvts}){
  const [month,setMonth]=useState(nowM());
  const [fcat,setFcat]=useState('Tous');
  const mMvts=mvts.filter(m=>mKey(m.date)===month);
  const isCur=month===nowM();
  const cats=['Tous',...CATS];
  const rows=arts
    .filter(a=>fcat==='Tous'||a.cat===fcat)
    .map(a=>{
      const ent=mMvts.filter(m=>m.type==='entree'&&m.artId===a.id).reduce((s,m)=>s+m.qty,0);
      const sort=mMvts.filter(m=>m.type==='sortie'&&m.artId===a.id).reduce((s,m)=>s+m.qty,0);
      const act=isCur?a.stock:null;
      const ini=isCur?(a.stock-ent+sort):null;
      return {...a,ent,sort,act,ini,has:ent>0||sort>0||a.stock>0};
    }).filter(a=>a.has||a.stock>0);
  const tEnt=rows.reduce((s,a)=>s+a.ent,0);
  const tSort=rows.reduce((s,a)=>s+a.sort,0);
  return h('div',{style:{padding:'14px 14px 0'}},
    h('div',{style:{fontSize:18,fontWeight:700,color:C.navy,marginBottom:12}},'Inventaire mensuel'),
    h('input',{type:'month',value:month,onChange:e=>setMonth(e.target.value),style:{width:'100%',padding:'9px 11px',borderRadius:9,border:`1px solid ${C.border}`,fontSize:13,outline:'none',background:'#fff',marginBottom:12}}),
    h('div',{style:{display:'flex',gap:8,marginBottom:12}},
      h('div',{style:{flex:1,background:'#EEF8F2',borderRadius:9,padding:'10px 12px',border:`1px solid ${C.ok}33`}},
        h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.5px'}},'Entrées'),
        h('div',{style:{fontSize:20,fontWeight:700,color:C.ok}},tEnt)
      ),
      h('div',{style:{flex:1,background:'#FFF4EE',borderRadius:9,padding:'10px 12px',border:`1px solid ${C.warn}33`}},
        h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.5px'}},'Sorties'),
        h('div',{style:{fontSize:20,fontWeight:700,color:C.warn}},tSort)
      )
    ),
    h('div',{style:{display:'flex',gap:5,overflowX:'auto',paddingBottom:4,marginBottom:10}},
      ...cats.map(c=>h('button',{key:c,onClick:()=>setFcat(c),style:{padding:'4px 10px',borderRadius:20,fontSize:10,fontWeight:500,whiteSpace:'nowrap',cursor:'pointer',background:fcat===c?C.navy:'#fff',color:fcat===c?'#fff':C.text,border:fcat===c?'none':`1px solid ${C.border}`}},c))
    ),
    h('div',{style:{background:C.navy,borderRadius:'8px 8px 0 0',padding:'6px 10px',display:'grid',gridTemplateColumns:'1fr 42px 42px 42px 42px',gap:3}},
      h('div',{style:{fontSize:9,color:'#aab',fontWeight:600}},'PUBLICATION'),
      h('div',{style:{fontSize:9,color:'#aab',fontWeight:600,textAlign:'center'}},'INIT'),
      h('div',{style:{fontSize:9,color:'#7fc97f',fontWeight:600,textAlign:'center'}},'ENT'),
      h('div',{style:{fontSize:9,color:'#f4a261',fontWeight:600,textAlign:'center'}},'SORT'),
      h('div',{style:{fontSize:9,color:'#fff',fontWeight:600,textAlign:'center'}},'STOCK')
    ),
    rows.length===0?h('div',{style:{background:'#fff',borderRadius:'0 0 8px 8px',padding:'24px',textAlign:'center',color:C.muted,fontSize:12,border:`1px solid ${C.border}`,borderTop:'none'}},'Aucun mouvement pour ce mois'):
    rows.map((a,i)=>h('div',{key:a.id,style:{background:i%2===0?'#fff':'#FAFAF8',padding:'7px 10px',borderBottom:`1px solid #F0EDE8`,borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`,display:'grid',gridTemplateColumns:'1fr 42px 42px 42px 42px',gap:3,...(i===rows.length-1?{borderRadius:'0 0 8px 8px'}:{})}},
      h('div',null,
        h('div',{style:{fontSize:11,fontWeight:500,color:C.text,lineHeight:1.3}},a.nom),
        h('div',{style:{fontSize:9,color:C.muted}},a.sym)
      ),
      h('div',{style:{textAlign:'center',fontSize:12,fontWeight:500,color:C.muted,alignSelf:'center'}},a.ini!==null?a.ini:'-'),
      h('div',{style:{textAlign:'center',fontSize:12,fontWeight:600,color:a.ent>0?C.ok:C.muted,alignSelf:'center'}},a.ent>0?'+'+a.ent:'-'),
      h('div',{style:{textAlign:'center',fontSize:12,fontWeight:600,color:a.sort>0?C.warn:C.muted,alignSelf:'center'}},a.sort>0?a.sort:'-'),
      h('div',{style:{textAlign:'center',fontSize:13,fontWeight:700,color:C.navy,alignSelf:'center'}},a.act!==null?a.act:'-')
    )),
    h('div',{style:{height:16}})
  );

        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14}},
          h('button',{onClick:()=>setEm(Math.max(0,em-1)),style:{width:42,height:42,borderRadius:9,background:'#fff',border:`1px solid ${C.border}`,fontSize:18,cursor:'pointer'}},'−'),
          h('input',{type:'number',value:em,onChange:e=>setEm(Math.max(0,parseInt(e.target.value)||0)),style:{flex:1,textAlign:'center',padding:'9px',borderRadius:9,border:`1px solid ${C.border}`,fontSize:18,fontWeight:600,color:C.gold,outline:'none'}}),
          h('button',{onClick:()=>setEm(em+1),style:{width:42,height:42,borderRadius:9,background:C.gold+'22',border:`1px solid ${C.gold}44`,color:C.gold,fontSize:18,cursor:'pointer'}},'+')
        ),
        h('button',{onClick:()=>{onUpdate(art.id,es,em);onClose();},style:{width:'100%',padding:'12px',borderRadius:10,background:C.navy,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',border:'none'}},'Enregistrer les modifications')
      ),
      tab==='history'&&h('div',null,
        artMvts.length===0?h('div',{style:{textAlign:'center',padding:'20px',color:C.muted,fontSize:12}},'Aucun mouvement enregistré'):
        artMvts.map(m=>h('div',{key:m.id,style:{background:'#fff',borderRadius:8,padding:'8px 11px',marginBottom:5,display:'flex',alignItems:'center',gap:8,border:`1px solid ${C.border}`}},
          h('div',{style:{width:26,height:26,borderRadius:6,background:m.type==='sortie'?'#FFF4EE':'#EEF8F2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}},
            m.type==='sortie'?'↓':'↑'
          ),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:11,fontWeight:500,color:C.text,textTransform:'capitalize'}},m.type==='sortie'?'Sortie':'Réception'),
            h('div',{style:{fontSize:10,color:C.muted}},fmtD(m.date)+(m.personne?' · '+m.personne:'')+(m.langue&&m.langue!=='Français'?' · '+m.langue:''))
          ),
          h('span',{style:{fontSize:13,fontWeight:700,color:m.type==='sortie'?C.warn:C.ok}},(m.type==='sortie'?'-':'+')+m.qty)
        ))
      )
    )
  );
}

function Nav({scr,setScr,al}){
  const items=[
    {id:'dashboard',icon:'⌂',label:'Accueil'},
    {id:'stock',icon:'▣',label:'Stock'},
    {id:'mouvement',icon:'⇅',label:'Mouvement'},
    {id:'inventaire',icon:'▤',label:'Inventaire'},
    {id:'settings',icon:'⚙',label:'Réglages'},
  ];
  return h('div',{style:{position:'sticky',bottom:0,background:'#fff',borderTop:`1px solid ${C.border}`,display:'flex',padding:'7px 0 10px',zIndex:50}},
    ...items.map(({id,icon,label})=>{
      const active=scr===id;
      const badge=id==='stock'&&al>0;
      return h('button',{key:id,onClick:()=>setScr(id),style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'2px 0',position:'relative'}},
        h('div',{style:{position:'relative'}},
          h('span',{style:{fontSize:18,color:active?C.navy:C.muted,transition:'all .2s',lineHeight:1}},icon),
          badge&&h('span',{style:{position:'absolute',top:-5,right:-5,width:13,height:13,background:C.danger,borderRadius:'50%',fontSize:7,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}},al)
        ),
        h('span',{style:{fontSize:8,color:active?C.navy:C.muted,fontWeight:active?700:400}},label)
      );
    })
  );
}

function App(){
  const [loaded,setLoaded]=useState(false);
  const [scr,setScr]=useState('dashboard');
  const [arts,setArts]=useState(INIT_ARTS);
  const [mvts,setMvts]=useState([]);
  const [asm,setAsm]=useState({nom:'Mon Assemblée',ville:'',numero:'',departement:'',pays:'Bénin',langue:'Français',prepose:'',responsable:''});
  const [modal,setModal]=useState(null);

  useEffect(()=>{
    try{
      const r=DB.get('inventory-app-v4');
      if(r){const d=JSON.parse(r.value);if(d.arts?.length)setArts(d.arts);if(d.mvts)setMvts(d.mvts);if(d.asm)setAsm(d.asm);}
    }catch(e){}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    try{DB.set('inventory-app-v4',JSON.stringify({arts,mvts,asm}));}catch(e){}
  },[arts,mvts,asm,loaded]);

  const updStock=(id,s,m)=>setArts(p=>p.map(a=>a.id===id?{...a,stock:Math.max(0,s),min:Math.max(0,m)}:a));
  const addMvt=({type,artId,artNom,artSym,qty,date,personne,langue})=>{
    setArts(p=>p.map(a=>a.id===artId?{...a,stock:type==='entree'?a.stock+qty:Math.max(0,a.stock-qty)}:a));
    setMvts(p=>[{id:uid(),type,artId,artNom,artSym,qty,date,personne:personne||'',langue:langue||'Français'},...p]);
  };
  const alerts=arts.filter(a=>getSt(a)!=='ok');

  if(!loaded)return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:400,background:C.bg}},
    h('div',{style:{textAlign:'center'}},
      h('div',{style:{fontSize:22,fontWeight:800,color:C.navy,fontFamily:"'Outfit',system-ui"}},'◆ INVENTORY'),
      h('div',{style:{fontSize:12,color:C.muted,marginTop:4}},'Chargement...')
    )
  );

  return h('div',{style:{maxWidth:430,margin:'0 auto',background:C.bg,minHeight:'100dvh',display:'flex',flexDirection:'column',fontFamily:"'Outfit',system-ui,sans-serif"}},
    h('div',{style:{flex:1,overflowY:'auto'}},
      scr==='dashboard'&&h(Dashboard,{arts,mvts,asm,setScr}),
      scr==='stock'&&h(Stock,{arts,onArt:setModal}),
      scr==='mouvement'&&h(Mouvement,{arts,mvts,onAdd:addMvt}),
      scr==='inventaire'&&h(Inventaire,{arts,mvts}),
      scr==='settings'&&h(Params,{asm,setAsm,arts,setArts})
    ),
    h(Nav,{scr,setScr,al:alerts.length}),
    modal&&h(Modal,{art:modal,onClose:()=>setModal(null),onUpdate:updStock,mvts})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
