const toDay = () => new Date().toISOString().split('T')[0];
const fmtD = (d) => { try { return new Date(d+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); } catch(e) { return d; }};
const fmtMonth = (m) => { try { const p=m.split('-'); return new Date(+p[0],+p[1]-1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'}); } catch(e) { return m; }};
const mKey = (d) => d ? d.slice(0,7) : '';
const nowM = () => mKey(toDay());
const getSt = (a) => a.min_stock === 0 ? 'ok' : a.stock === 0 ? 'empty' : a.stock < a.min_stock ? 'low' : 'ok';
const stStyle = (s) => ({ok:{c:C.ok,bg:'#EEF8F2'}, low:{c:C.warn,bg:'#FFF4EE'}, empty:{c:C.danger,bg:'#FFF0EE'}}[s]);
const stLabel = (s) => ({ok:'En stock', low:'Faible', empty:'Épuisé'}[s]);

const db = {
  // Session
  getSession() {
    try { return JSON.parse(localStorage.getItem('inv_session') || 'null'); } catch(e) { return null; }
  },
  setSession(assemblee_id, membre_id) {
    localStorage.setItem('inv_session', JSON.stringify({assemblee_id, membre_id}));
  },
  clearSession() {
    localStorage.removeItem('inv_session');
  },

  // Assemblées
  async getAssemblees() {
    const {data} = await sb.from('assemblees').select('*');
    return data || [];
  },
  async createAssemblee(asm) {
    const {data,error} = await sb.from('assemblees').insert(asm).select().single();
    if (error) throw error;
    return data;
  },
  async updateAssemblee(id, fields) {
    await sb.from('assemblees').update(fields).eq('id', id);
  },

  // Membres
  async getMembres(assemblee_id) {
    const {data} = await sb.from('membres').select('*').eq('assemblee_id', assemblee_id).order('created_at');
    return data || [];
  },
  async getMembre(id) {
    const {data} = await sb.from('membres').select('*').eq('id', id).single();
    return data;
  },
  async createMembre(m) {
    const {data,error} = await sb.from('membres').insert(m).select().single();
    if (error) throw error;
    return data;
  },
  async updateMembre(id, fields) {
    await sb.from('membres').update(fields).eq('id', id);
  },
  async deleteMembre(id) {
    await sb.from('membres').delete().eq('id', id);
  },

  // Articles
  async getArticles(assemblee_id) {
    const {data} = await sb.from('articles').select('*').eq('assemblee_id', assemblee_id).order('cat,nom');
    return data || [];
  },
  async createArticle(a) {
    const {data,error} = await sb.from('articles').insert(a).select().single();
    if (error) throw error;
    return data;
  },
  async updateArticle(id, fields) {
    await sb.from('articles').update(fields).eq('id', id);
  },
  async insertDefaultArticles(assemblee_id) {
    const rows = DEFAULT_ARTICLES.map(a => ({...a, assemblee_id}));
    await sb.from('articles').insert(rows);
  },

  // Mouvements
  async getMouvements(assemblee_id, limit=100) {
    const {data} = await sb.from('mouvements').select('*').eq('assemblee_id', assemblee_id).order('created_at',{ascending:false}).limit(limit);
    return data || [];
  },
  async createMouvement(m) {
    const {data,error} = await sb.from('mouvements').insert(m).select().single();
    if (error) throw error;
    // Update article stock
    const art = await sb.from('articles').select('stock').eq('id', m.article_id).single();
    if (art.data) {
      const newStock = m.type === 'entree' ? art.data.stock + m.quantite : Math.max(0, art.data.stock - m.quantite);
      await sb.from('articles').update({stock: newStock}).eq('id', m.article_id);
    }
    return data;
  },

  // Demandes
  async getDemandes(assemblee_id) {
    const {data} = await sb.from('demandes').select('*').eq('assemblee_id', assemblee_id).order('created_at',{ascending:false});
    return data || [];
  },
  async createDemande(d) {
    const {data,error} = await sb.from('demandes').insert(d).select().single();
    if (error) throw error;
    return data;
  },
  async updateDemande(id, fields) {
    await sb.from('demandes').update(fields).eq('id', id);
  }
};

function Badge({s}) {
  const {c,bg} = stStyle(s);
  return h('span',{style:{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:20,background:bg,color:c}},stLabel(s));
}

function Stat({label,val,sub,color}) {

    h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:3}},label),

    sub && h('div',{style:{fontSize:10,color:C.muted,marginTop:2}},sub)

function ArtCard({art,onClick}) {
  const s = getSt(art); const {c,bg} = stStyle(s);
  return h('div',{onClick:()=>onClick(art),style:{background:'#fff',borderRadius:12,padding:'11px 14px',marginBottom:7,cursor:'pointer',border:'1px solid '+(s==='ok'?C.border:c+'44'),display:'flex',alignItems:'center',gap:10}},
    h('div',{style:{minWidth:38,height:38,borderRadius:8,background:bg,display:'flex',alignItems:'center',justifyContent:'center'}},
      h('span',{style:{fontSize:8,color:c,fontWeight:700,textAlign:'center',lineHeight:1.2}},art.code)),
    h('div',{style:{flex:1,minWidth:0}},
      h('div',{style:{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},art.nom),
      h('div',{style:{fontSize:11,color:C.muted,marginTop:1}},art.sym)),
    h('div',{style:{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}},
      h('div',{style:{fontSize:20,fontWeight:700,color:c,lineHeight:1}},art.stock),
      h(Badge,{s}))
  );
}

function Inp({label,value,onChange,placeholder,type}) {
  return h('div',{style:{marginBottom:11}},
    h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},label),
    h('input',{type:type||'text',value:value||'',onChange:e=>onChange(e.target.value),placeholder,style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}})
  );
}

function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);
  return h('div',{style:{position:'fixed',top:12,left:16,right:16,maxWidth:398,margin:'0 auto',zIndex:200,background:'#EEF8F2',border:'1px solid '+C.ok+'33',borderRadius:11,padding:'11px 14px',display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 20px rgba(0,0,0,.12)'}},
    h('span',{style:{color:C.ok,fontSize:15}},'✓'),
    h('span',{style:{fontSize:12,color:C.ok,fontWeight:500,flex:1}},msg)
  );
}

// ═══════════════════════════════════════
function Onboarding({onDone}) {
  const [step,setStep] = useState(1);
  const [asm,setAsm] = useState({nom:'',ville:'',numero:'',pays:'Bénin',langue:'Français'});
  const [usr,setUsr] = useState({prenom:'',nom:'',tel:'',role:'prepose',pin:''});
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState('');

  const finish = async () => {
    if (busy) return;
    setBusy(true); setErr('');
    try {
      const newAsm = await db.createAssemblee(asm);
      const newMembre = await db.createMembre({...usr, assemblee_id: newAsm.id});
      await db.insertDefaultArticles(newAsm.id);
      db.setSession(newAsm.id, newMembre.id);
      onDone(newAsm, newMembre);
    } catch(e) {
      setErr('Erreur : ' + (e.message || 'connexion impossible'));
      setBusy(false);
    }
  };

  return h('div',{style:{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',minHeight:'100vh',justifyContent:'center'}},
    h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}},'◆ INVENTORY'),
    h('div',{style:{fontSize:22,fontWeight:800,color:C.navy,marginBottom:6}}, step===1 ? 'Bienvenue !' : 'Votre profil'),
    h('div',{style:{fontSize:12,color:C.muted,marginBottom:28,textAlign:'center'}},
      step===1 ? "Commencez par renseigner votre assemblée" : "Créez votre compte administrateur"),
    err && h('div',{style:{background:'#FFF0EE',border:'1px solid '+C.danger+'33',borderRadius:9,padding:'8px 14px',marginBottom:12,fontSize:12,color:C.danger,width:'100%',maxWidth:340,textAlign:'center'}},err),

    step===1 && h('div',{style:{width:'100%',maxWidth:340}},
      h(Inp,{label:"NOM DE L'ASSEMBLÉE",value:asm.nom,onChange:v=>setAsm({...asm,nom:v}),placeholder:'Ex: Assemblée de Cotonou'}),
      h('div',{style:{display:'flex',gap:8}},
        h('div',{style:{flex:1}},h(Inp,{label:'NUMÉRO',value:asm.numero,onChange:v=>setAsm({...asm,numero:v}),placeholder:'23456'})),
        h('div',{style:{flex:2}},h(Inp,{label:'VILLE',value:asm.ville,onChange:v=>setAsm({...asm,ville:v}),placeholder:'Cotonou'}))),
      h(Inp,{label:'PAYS',value:asm.pays,onChange:v=>setAsm({...asm,pays:v})}),
      h('button',{onClick:()=>{if(asm.nom)setStep(2);},disabled:!asm.nom,
        style:{width:'100%',padding:'13px',borderRadius:11,background:asm.nom?C.navy:'#E8E5DF',color:asm.nom?'#fff':C.muted,fontSize:14,fontWeight:600,cursor:asm.nom?'pointer':'not-allowed',border:'none'}},'Continuer →')),

    step===2 && h('div',{style:{width:'100%',maxWidth:340}},
      h(Inp,{label:'PRÉNOM',value:usr.prenom,onChange:v=>setUsr({...usr,prenom:v}),placeholder:'Votre prénom'}),
      h(Inp,{label:'NOM',value:usr.nom,onChange:v=>setUsr({...usr,nom:v}),placeholder:'Votre nom'}),
      h(Inp,{label:'TÉLÉPHONE',value:usr.tel,onChange:v=>setUsr({...usr,tel:v}),placeholder:'+229 97 00 00 00',type:'tel'}),
      h('div',{style:{marginBottom:11}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'VOTRE RÔLE'),
        h('select',{value:usr.role,onChange:e=>setUsr({...usr,role:e.target.value}),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
          ...ROLES.map(r=>h('option',{key:r.id,value:r.id},r.label)))),
      h(Inp,{label:'CODE PIN (4 chiffres)',value:usr.pin,onChange:v=>setUsr({...usr,pin:v.replace(/\D/g,'').slice(0,4)}),placeholder:'1234',type:'password'}),

function MouvementPage({arts,mvts,asmId,user,onRefresh}) {
  const [type,setType] = useState('sortie');
  const [q,setQ] = useState('');
  const [sel,setSel] = useState(null);
  const [qty,setQty] = useState(1);
  const [per,setPer] = useState('');
  const [langue,setLangue] = useState('Français');
  const [dt,setDt] = useState(toDay());
  const [busy,setBusy] = useState(false);
  const [ok,setOk] = useState(false);
  const [err,setErr] = useState('');

  const filt = arts.filter(a => q && (a.nom.toLowerCase().includes(q.toLowerCase()) || a.code.includes(q) || (a.sym||'').toLowerCase().includes(q.toLowerCase())));

  const submit = async () => {
    if (!sel || qty<1 || busy) return;
    if (type==='sortie' && sel.stock<qty) { setErr('Stock insuffisant ('+sel.stock+' dispo)'); setTimeout(()=>setErr(''),3000); return; }
    setBusy(true);
    try {
      await db.createMouvement({assemblee_id:asmId, article_id:sel.id, type, quantite:parseInt(qty), langue, personne:per, membre_id:user.id, date:dt});
      setSel(null);setQ('');setQty(1);setPer('');setDt(toDay());
      setOk(true); setTimeout(()=>setOk(false),2500);
      await onRefresh();
    } catch(e) { setErr('Erreur: '+(e.message||'?')); setTimeout(()=>setErr(''),3000); }
    setBusy(false);
  };

  const rec = mvts.slice(0,7);
  const btn = (t,label) => h('button',{onClick:()=>setType(t),style:{flex:1,padding:'9px 8px',borderRadius:7,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:type===t?'#fff':'transparent',color:type===t?(t==='sortie'?C.warn:C.ok):C.muted,boxShadow:type===t?'0 1px 4px rgba(0,0,0,.1)':'none'}},label);

  return h('div',{style:{padding:'14px'}},
    h('div',{style:{fontSize:18,fontWeight:700,color:C.navy,marginBottom:14}},'Enregistrer un mouvement'),
    ok && h('div',{style:{background:'#EEF8F2',border:'1px solid '+C.ok+'33',borderRadius:9,padding:'10px 13px',marginBottom:12,display:'flex',alignItems:'center',gap:7}},h('span',{style:{color:C.ok,fontSize:16}},'✓'),h('span',{style:{fontSize:12,color:C.ok,fontWeight:500}},'Mouvement enregistré !')),
    err && h('div',{style:{background:'#FFF0EE',border:'1px solid '+C.danger+'33',borderRadius:9,padding:'10px 13px',marginBottom:12,display:'flex',alignItems:'center',gap:7}},h('span',{style:{color:C.danger,fontSize:16}},'⚠'),h('span',{style:{fontSize:12,color:C.danger,fontWeight:500}},err)),
    h('div',{style:{display:'flex',background:'#E8E5DF',borderRadius:9,padding:3,marginBottom:14}},btn('sortie','↓  Sortie'),btn('entree','↑  Réception')),

    // Article selection
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:5}},'PUBLICATION'),
      sel ? h('div',{style:{background:'#F0F4FF',border:'1px solid '+C.navy+'33',borderRadius:9,padding:'9px 12px',display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{flex:1}},h('div',{style:{fontSize:12,fontWeight:600,color:C.navy}},sel.nom),h('div',{style:{fontSize:10,color:C.muted}},sel.code+' · Stock: '+sel.stock)),
        h('span',{onClick:()=>{setSel(null);setQ('');},style:{cursor:'pointer',color:C.muted,fontSize:16}},'✕'))
      : h('div',null,
        h('div',{style:{position:'relative'}},
          h('span',{style:{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:C.muted,fontSize:13}},'🔍'),
          h('input',{value:q,onChange:e=>setQ(e.target.value),placeholder:'Rechercher...',style:{width:'100%',padding:'9px 10px 9px 30px',borderRadius:9,border:'1px solid '+C.border,background:'#fff',fontSize:12,outline:'none'}})),
        q && filt.length>0 && h('div',{style:{background:'#fff',border:'1px solid '+C.border,borderRadius:9,marginTop:3,maxHeight:180,overflowY:'auto'}},
          ...filt.slice(0,5).map(a => h('div',{key:a.id,onClick:()=>{setSel(a);setQ('');},style:{padding:'9px 12px',cursor:'pointer',borderBottom:'1px solid #F5F3EE',display:'flex',alignItems:'center',gap:8}},
            h('div',{style:{flex:1}},h('div',{style:{fontSize:12,fontWeight:500,color:C.text}},a.nom),h('div',{style:{fontSize:10,color:C.muted}},a.code+' · '+a.sym)),
            h(Badge,{s:getSt(a)})))),
        q && filt.length===0 && h('div',{style:{padding:'7px 4px',fontSize:11,color:C.muted}},'Aucun résultat'))),

    // Qty
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:5}},'QUANTITÉ'),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('button',{onClick:()=>setQty(Math.max(1,qty-1)),style:{width:40,height:40,borderRadius:9,background:'#fff',border:'1px solid '+C.border,fontSize:18,cursor:'pointer'}},'−'),
        h('input',{type:'number',value:qty,onChange:e=>setQty(Math.max(1,parseInt(e.target.value)||1)),style:{flex:1,textAlign:'center',padding:'9px',borderRadius:9,border:'1px solid '+C.border,fontSize:20,fontWeight:700,color:C.navy,outline:'none'}}),
        h('button',{onClick:()=>setQty(qty+1),style:{width:40,height:40,borderRadius:9,background:C.navy,border:'none',fontSize:18,color:'#fff',cursor:'pointer'}},'+'))),

    // Date + Langue
    h('div',{style:{display:'flex',gap:8,marginBottom:12}},
      h('div',{style:{flex:1}},h(Inp,{label:'DATE',value:dt,onChange:v=>setDt(v),type:'date'})),
      h('div',{style:{flex:1}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'LANGUE'),
        h('select',{value:langue,onChange:e=>setLangue(e.target.value),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
          ...LANGUES.map(l=>h('option',{key:l,value:l},l))))),

    h(Inp,{label:'PERSONNE (optionnel)',value:per,onChange:v=>setPer(v),placeholder:'Nom du proclamateur'}),

    h('button',{onClick:submit,disabled:!sel||busy,style:{width:'100%',padding:'13px',borderRadius:11,background:sel?C.navy:'#E8E5DF',color:sel?'#fff':C.muted,fontSize:14,fontWeight:600,cursor:sel?'pointer':'not-allowed',border:'none',marginBottom:20}},
      busy ? 'Enregistrement...' : (type==='sortie' ? 'Enregistrer la sortie ↓' : 'Enregistrer la réception ↑')),

    rec.length>0 && h('div',null,
      h('div',{style:{fontSize:12,fontWeight:600,color:C.text,marginBottom:8}},'Derniers mouvements'),
      ...rec.map(m => {
        const art = arts.find(a=>a.id===m.article_id);
        return h('div',{key:m.id,style:{background:'#fff',borderRadius:9,padding:'9px 12px',marginBottom:5,display:'flex',alignItems:'center',gap:8,border:'1px solid '+C.border}},
          h('div',{style:{width:28,height:28,borderRadius:7,background:m.type==='sortie'?'#FFF4EE':'#EEF8F2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}},m.type==='sortie'?'↓':'↑'),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontSize:12,fontWeight:500,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},art?art.nom:'?'),
            h('div',{style:{fontSize:10,color:C.muted}},fmtD(m.date)+(m.personne?' · '+m.personne:''))),
          h('span',{style:{fontSize:13,fontWeight:700,color:m.type==='sortie'?C.warn:C.ok}},(m.type==='sortie'?'-':'+')+m.quantite));
      }))
  );
}

// INVENTAIRE
// ═══════════════════════════════════════
function InventairePage({arts,mvts}) {
  const [month,setMonth] = useState(nowM());
  const [fcat,setFcat] = useState('Tous');
  const mMvts = mvts.filter(m => mKey(m.date)===month);
  const isCur = month===nowM();
  const cats = ['Tous',...CATS];
  const rows = arts.filter(a => fcat==='Tous'||a.cat===fcat).map(a => {
    const ent = mMvts.filter(m=>m.type==='entree'&&m.article_id===a.id).reduce((s,m)=>s+m.quantite,0);
    const sort = mMvts.filter(m=>m.type==='sortie'&&m.article_id===a.id).reduce((s,m)=>s+m.quantite,0);
    return {...a,ent,sort,act:isCur?a.stock:null,ini:isCur?(a.stock-ent+sort):null,has:ent>0||sort>0||a.stock>0};
  }).filter(a=>a.has||a.stock>0);
  const tEnt = rows.reduce((s,a)=>s+a.ent,0);
  const tSort = rows.reduce((s,a)=>s+a.sort,0);

  return h('div',{style:{padding:'14px 14px 20px'}},
    h('div',{style:{fontSize:18,fontWeight:700,color:C.navy,marginBottom:12}},'Inventaire mensuel'),
    h('input',{type:'month',value:month,onChange:e=>setMonth(e.target.value),style:{width:'100%',padding:'9px 11px',borderRadius:9,border:'1px solid '+C.border,fontSize:13,outline:'none',background:'#fff',marginBottom:12}}),
    h('div',{style:{display:'flex',gap:8,marginBottom:12}},
      h('div',{style:{flex:1,background:'#EEF8F2',borderRadius:9,padding:'10px 12px',border:'1px solid '+C.ok+'33'}},h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase'}},'Entrées'),h('div',{style:{fontSize:20,fontWeight:700,color:C.ok}},tEnt)),
      h('div',{style:{flex:1,background:'#FFF4EE',borderRadius:9,padding:'10px 12px',border:'1px solid '+C.warn+'33'}},h('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase'}},'Sorties'),h('div',{style:{fontSize:20,fontWeight:700,color:C.warn}},tSort))),
    h('div',{style:{display:'flex',gap:5,overflowX:'auto',paddingBottom:4,marginBottom:10}},
      ...cats.map(c=>h('button',{key:c,onClick:()=>setFcat(c),style:{padding:'4px 10px',borderRadius:20,fontSize:10,fontWeight:500,whiteSpace:'nowrap',cursor:'pointer',background:fcat===c?C.navy:'#fff',color:fcat===c?'#fff':C.text,border:fcat===c?'none':'1px solid '+C.border}},c))),
    // Table
    h('div',{style:{background:C.navy,borderRadius:'8px 8px 0 0',padding:'6px 10px',display:'grid',gridTemplateColumns:'1fr 42px 42px 42px 42px',gap:3}},
      h('div',{style:{fontSize:9,color:'#aab',fontWeight:600}},'PUBLICATION'),

  const loadData = useCallback(async (asmId) => {
    const [a, m, ar, mv] = await Promise.all([
      sb.from('assemblees').select('*').eq('id',asmId).single(),
      db.getMembres(asmId),
      db.getArticles(asmId),
      db.getMouvements(asmId, 200)
    ]);
    if (a.data) setAsm(a.data);
    setMembres(m); setArts(ar); setMvts(mv);
  }, []);

  const refresh = useCallback(async () => {
    if (asm) await loadData(asm.id);
  }, [asm, loadData]);

  // Init
  useEffect(() => {
    (async () => {
      try {
        const session = db.getSession();
        if (session && session.assemblee_id && session.membre_id) {
          const membre = await db.getMembre(session.membre_id);
          if (membre && membre.actif !== false) {
            setUser(membre);
            await loadData(session.assemblee_id);
            setScreen('main');
            return;
          }
        }
        // No valid session - check if assemblees exist
        const asms = await db.getAssemblees();
        if (asms.length > 0) {
          const firstAsm = asms[0];
          const mbrs = await db.getMembres(firstAsm.id);
          const activeMbrs = mbrs.filter(m => m.actif !== false);
          if (activeMbrs.length > 0) {
            setAsm(firstAsm);
            setMembres(activeMbrs);
            setScreen('login');
          } else {
            setScreen('onboarding');
          }
        } else {
          setScreen('onboarding');
        }
      } catch(e) {
        console.error('Init error:', e);
        setScreen('onboarding');
      }
    })();
  }, []);

  const handleLogin = async (membre) => {
    setUser(membre);
    await loadData(membre.assemblee_id);
    setScreen('main');
  };

  const handleOnboardDone = async (newAsm, newMembre) => {
    setAsm(newAsm);
    setUser(newMembre);
    await loadData(newAsm.id);
    setScreen('main');
  };

  const handleLogout = () => {
    db.clearSession();
    setUser(null);
    setScreen('login');
  };

  const alerts = arts.filter(a => getSt(a) !== 'ok');

  if (screen === 'loading') {
    return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:C.bg}},
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',marginBottom:4}},'◆ INVENTORY'),
        h('div',{style:{fontSize:12,color:C.muted}},'Connexion à la base de données...')));
  }

  if (screen === 'onboarding') {
    return h('div',{style:{maxWidth:430,margin:'0 auto',background:C.bg,minHeight:'100vh'}},
      h(Onboarding,{onDone:handleOnboardDone}));
  }

  if (screen === 'login') {
    const activeMembres = membres.filter(m => m.actif !== false);
    return h('div',{style:{maxWidth:430,margin:'0 auto',background:C.bg,minHeight:'100vh'}},
      h(LoginScreen,{membres:activeMembres, asmNom:asm?asm.nom:'', onOk:handleLogin}));
  }

  // MAIN
  return h('div',{style:{maxWidth:430,margin:'0 auto',background:C.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}},
    h('div',{style:{flex:1,overflowY:'auto'}},
      page==='dashboard' && h(Dashboard,{arts,mvts,asm,user,setPage}),
      page==='stock' && h(StockPage,{arts,onArt:setModal}),
      page==='mouvement' && h(MouvementPage,{arts,mvts,asmId:asm.id,user,onRefresh:refresh}),
      page==='inventaire' && h(InventairePage,{arts,mvts}),
      page==='settings' && h(SettingsPage,{asm,user,membres,arts,asmId:asm.id,onRefresh:refresh,onLogout:handleLogout})),
    h(Nav,{page,setPage,alertCount:alerts.length}),
    modal && h(ModalArticle,{art:modal,user,mvts,onClose:()=>setModal(null),onRefresh:refresh})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
</body>
</html>
