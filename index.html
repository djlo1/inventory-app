const toDay = () => new Date().toISOString().split('T')[0];
const fmtD = (d) => { try { return new Date(d+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); } catch(e) { return d; }};
const fmtMonth = (m) => { try { const p=m.split('-'); return new Date(+p[0],+p[1]-1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'}); } catch(e) { return m; }};
const mKey = (d) => d ? d.slice(0,7) : '';
const nowM = () => mKey(toDay());
const getSt = (a) => a.min_stock === 0 ? 'ok' : a.stock === 0 ? 'empty' : a.stock < a.min_stock ? 'low' : 'ok';

// SEARCH SELECT (dropdown filtrable)
// ═══════════════════════════════════════
function SearchSelect({options, value, onChange, placeholder, renderOption}) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState('');
  const selected = options.find(o => o.value === value);
  const filtered = options.filter(o => !q || (o.label||'').toLowerCase().includes(q.toLowerCase()) || (o.sub||'').toLowerCase().includes(q.toLowerCase()));
  return h('div',{style:{position:'relative'}},
    h('div',{onClick:()=>setOpen(!open),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',minHeight:38}},
      h('span',{style:{color:selected?C.text:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}},selected?selected.label:(placeholder||'Sélectionner...')),
      h('span',{style:{color:C.muted,fontSize:10,marginLeft:4}},open?'▲':'▼')),
    open && h('div',{style:{position:'absolute',top:'100%',left:0,right:0,zIndex:60,background:'#fff',border:'1px solid '+C.border,borderRadius:8,marginTop:2,boxShadow:'0 8px 24px rgba(0,0,0,.12)',maxHeight:240,overflow:'hidden',display:'flex',flexDirection:'column'}},
      h('div',{style:{padding:'6px 8px',borderBottom:'1px solid '+C.border}},
        h('input',{value:q,onChange:e=>setQ(e.target.value),placeholder:'🔍 Rechercher...',autoFocus:true,
          style:{width:'100%',padding:'7px 8px',borderRadius:6,border:'1px solid '+C.border,fontSize:11,outline:'none'}})),
      h('div',{style:{overflowY:'auto',maxHeight:190}},
        filtered.length===0 && h('div',{style:{padding:'12px',textAlign:'center',color:C.muted,fontSize:11}},'Aucun résultat'),
        ...filtered.map(o => h('div',{key:o.value,onClick:()=>{onChange(o.value);setOpen(false);setQ('');},
          style:{padding:'8px 10px',cursor:'pointer',borderBottom:'1px solid #F5F3EE',background:o.value===value?C.navy+'08':'#fff'}},
          renderOption ? renderOption(o) : h('div',null,
            h('div',{style:{fontSize:12,fontWeight:500,color:C.text}},o.label),
            o.sub && h('div',{style:{fontSize:10,color:C.muted}},o.sub))))),
      h('div',{onClick:()=>{setOpen(false);setQ('');},style:{position:'fixed',inset:0,zIndex:-1}}))
  );
}

}

    sub && h('div',{style:{fontSize:10,color:C.muted,marginTop:2}},sub)

}

}

function Inp({label,value,onChange,placeholder,type}) {
  return h('div',{style:{marginBottom:11}},
    h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},label),
    h('input',{type:type||'text',value:value||'',onChange:e=>onChange(e.target.value),placeholder,style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}})
  );
}

function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);
  return h('div',{style:{position:'fixed',top:12,left:16,right:16,maxWidth:398,margin:'0 auto',zIndex:200,background:'#EEF8F2',border:'1px solid '+C.ok+'33',borderRadius:11,padding:'11px 14px',display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 20px rgba(0,0,0,.12)'}},
    h('span',{style:{color:C.ok,fontSize:15}},'✓'),
    h('span',{style:{fontSize:12,color:C.ok,fontWeight:500,flex:1}},msg)
  );
}

// AUTH SCREEN (Connexion + Inscription)

function AuthScreen({onLogin}) {
  const [mode,setMode] = useState('connexion');
  return h('div',{className:'app-shell'},
    mode === 'connexion' ? h(ConnexionForm,{onLogin, goInscription:()=>setMode('inscription')})
    : h(InscriptionForm,{onLogin, goConnexion:()=>setMode('connexion')})
  );
}

function ConnexionForm({onLogin, goInscription}) {
  const [username,setUsername] = useState('');
  const [pin,setPin] = useState('');
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState('');

  const go = async () => {
    if (!username || pin.length < 4 || busy) return;
    setBusy(true); setErr('');
    try {
      const {data:found} = await sb.from('membres').select('*').ilike('username', username.trim()).eq('pin', pin).eq('actif', true);
      if (found && found.length > 0) {
        const membre = found[0];
        db.setSession(membre.assemblee_id, membre.id);
        onLogin(membre);
      } else {
        setErr("Nom d'utilisateur ou code PIN incorrect.");
      }
    } catch(e) {
      setErr('Erreur de connexion : ' + (e.message || '?'));
    }
    setBusy(false);
  };

  return h('div',{style:{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh'}},
    h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}},'◆ INVENTORY'),
    h('div',{style:{fontSize:22,fontWeight:800,color:C.navy,marginBottom:6}},'Connexion'),
    h('div',{style:{fontSize:12,color:C.muted,marginBottom:24,textAlign:'center'}},"Entrez votre nom d'utilisateur et votre code PIN"),
    err && h('div',{style:{background:'#FFF0EE',border:'1px solid '+C.danger+'33',borderRadius:9,padding:'8px 14px',marginBottom:12,fontSize:12,color:C.danger,width:'100%',maxWidth:340,textAlign:'center'}},err),
    h('div',{style:{width:'100%',maxWidth:340}},
      h(Inp,{label:"NOM D'UTILISATEUR",value:username,onChange:v=>setUsername(v),placeholder:'Ex: djlo.alo'}),
      h(Inp,{label:'CODE PIN',value:pin,onChange:v=>setPin(v.replace(/\D/g,'').slice(0,4)),placeholder:'••••',type:'password'}),
      h('button',{onClick:go,disabled:!username||pin.length<4||busy,
        style:{width:'100%',padding:'13px',borderRadius:11,background:(username&&pin.length>=4)?C.navy:'#E8E5DF',color:(username&&pin.length>=4)?'#fff':C.muted,fontSize:14,fontWeight:600,cursor:(username&&pin.length>=4)?'pointer':'not-allowed',border:'none',marginTop:4}},
        busy ? 'Connexion...' : 'Se connecter'),
      h('div',{style:{textAlign:'center',marginTop:20}},
        h('div',{style:{fontSize:12,color:C.muted,marginBottom:6}},"Pas encore de compte ?"),
        h('div',{onClick:goInscription,style:{fontSize:13,color:C.gold,fontWeight:600,cursor:'pointer'}},'Créer un compte →')))
  );
}



function InscriptionForm({onLogin, goConnexion}) {
  const [step,setStep] = useState(1);
  const [asm,setAsm] = useState({nom:'',ville:'',numero:'',pays:'Bénin',langue:'Français',departement:''});
  const [usr,setUsr] = useState({prenom:'',nom:'',username:'',tel:'',role:'responsable',pin:''});
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState('');

  const numValid = /^[A-Z]{2}\d{4}$/.test(asm.numero.toUpperCase());
  const step1Ok = asm.nom && asm.numero && numValid;
  const step2Ok = usr.prenom && usr.nom && usr.username && usr.pin.length >= 4;

  const finish = async () => {
    if (busy) return;
    setBusy(true); setErr('');
    try {
      // Vérifier username unique
      const {data:existingUser} = await sb.from('membres').select('id').ilike('username', usr.username.trim());
      if (existingUser && existingUser.length > 0) { setErr("Ce nom d'utilisateur est déjà pris."); setBusy(false); return; }
      const numUp = asm.numero.toUpperCase();
      // Vérifier si l'assemblée existe déjà par numéro
      const {data:existingAsm} = await sb.from('assemblees').select('*').eq('numero', numUp);
      let targetAsm;
      if (existingAsm && existingAsm.length > 0) {
        // L'assemblée existe déjà — rejoindre
        targetAsm = existingAsm[0];
      } else {
        // Nouvelle assemblée
        const asmData = {...asm, numero: numUp};
        targetAsm = await db.createAssemblee(asmData);
        await db.insertDefaultArticles(targetAsm.id);
      }
      const newMembre = await db.createMembre({...usr, username: usr.username.trim().toLowerCase(), assemblee_id: targetAsm.id});
      db.setSession(targetAsm.id, newMembre.id);
      onLogin(newMembre);
    } catch(e) {
      setErr('Erreur : ' + (e.message || 'connexion impossible'));
      setBusy(false);
    }
  };

  return h('div',{style:{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh'}},
    h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}},'◆ INVENTORY'),
    h('div',{style:{fontSize:22,fontWeight:800,color:C.navy,marginBottom:6}}, step===1 ? 'Nouvelle assemblée' : 'Votre profil'),
    h('div',{style:{fontSize:12,color:C.muted,marginBottom:24,textAlign:'center'}},
      step===1 ? "Renseignez les informations de votre assemblée" : "Créez votre compte administrateur"),
    err && h('div',{style:{background:'#FFF0EE',border:'1px solid '+C.danger+'33',borderRadius:9,padding:'8px 14px',marginBottom:12,fontSize:12,color:C.danger,width:'100%',maxWidth:340,textAlign:'center'}},err),

    step===1 && h('div',{style:{width:'100%',maxWidth:340}},
      h(Inp,{label:"NOM DE L'ASSEMBLÉE *",value:asm.nom,onChange:v=>setAsm({...asm,nom:v}),placeholder:'Ex: Assemblée de Cotonou'}),
      h('div',{style:{marginBottom:11}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},"NUMÉRO DE L'ASSEMBLÉE * (format: XX0000)"),
        h('input',{value:asm.numero,onChange:e=>setAsm({...asm,numero:e.target.value.toUpperCase().slice(0,6)}),placeholder:'Ex: AL2261',maxLength:6,
          style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+(asm.numero && !numValid ? C.danger : C.border),fontSize:12,outline:'none',background:'#fff',textTransform:'uppercase',letterSpacing:2,fontWeight:600}}),
        asm.numero && !numValid && h('div',{style:{fontSize:10,color:C.danger,marginTop:3}},'Format requis : 2 lettres + 4 chiffres (ex: AL2261)')),
      h('div',{style:{display:'flex',gap:8}},
        h('div',{style:{flex:1}},h(Inp,{label:'VILLE',value:asm.ville,onChange:v=>setAsm({...asm,ville:v}),placeholder:'Cotonou'})),
        h('div',{style:{flex:1}},h(Inp,{label:'DÉPARTEMENT',value:asm.departement,onChange:v=>setAsm({...asm,departement:v}),placeholder:'Atlantique'}))),
      h(Inp,{label:'PAYS',value:asm.pays,onChange:v=>setAsm({...asm,pays:v})}),
      h('div',{style:{marginBottom:11}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'LANGUE PRINCIPALE'),
        h('select',{value:asm.langue,onChange:e=>setAsm({...asm,langue:e.target.value}),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
          ...LANGUES.map(l=>h('option',{key:l,value:l},l)))),
      h('div',{id:'asm-check'},null),
      h('button',{onClick:async()=>{if(!step1Ok)return;setErr('');const{data:ex}=await sb.from('assemblees').select('nom,numero').eq('numero',asm.numero.toUpperCase());if(ex&&ex.length>0){setErr('ℹ️ L\'assemblée '+ex[0].nom+' ('+ex[0].numero+') existe déjà. Votre compte sera ajouté à cette assemblée.');}setStep(2);},disabled:!step1Ok,
        style:{width:'100%',padding:'13px',borderRadius:11,background:step1Ok?C.navy:'#E8E5DF',color:step1Ok?'#fff':C.muted,fontSize:14,fontWeight:600,cursor:step1Ok?'pointer':'not-allowed',border:'none'}},'Continuer →')),

    step===2 && h('div',{style:{width:'100%',maxWidth:340}},
      h(Inp,{label:'PRÉNOM *',value:usr.prenom,onChange:v=>setUsr({...usr,prenom:v}),placeholder:'Votre prénom'}),
      h(Inp,{label:'NOM *',value:usr.nom,onChange:v=>setUsr({...usr,nom:v}),placeholder:'Votre nom'}),
      h(Inp,{label:"NOM D'UTILISATEUR *",value:usr.username,onChange:v=>setUsr({...usr,username:v.replace(/\s/g,'').toLowerCase()}),placeholder:'Ex: djlo.alo'}),
      h('div',{style:{fontSize:10,color:C.muted,marginTop:-8,marginBottom:11}},"Utilisé pour se connecter. Pas d'espaces."),
      h(Inp,{label:'TÉLÉPHONE',value:usr.tel,onChange:v=>setUsr({...usr,tel:v}),placeholder:'+229 97 00 00 00',type:'tel'}),
      h('div',{style:{marginBottom:11}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'VOTRE RÔLE'),
        h('select',{value:usr.role,onChange:e=>setUsr({...usr,role:e.target.value}),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
          h('option',{value:'responsable'},'Responsable de la prédication'),
          h('option',{value:'adjoint'},'Adjoint aux publications'),
          h('option',{value:'prepose'},'Préposé aux publications'))),
      h(Inp,{label:'CODE PIN * (4 chiffres)',value:usr.pin,onChange:v=>setUsr({...usr,pin:v.replace(/\D/g,'').slice(0,4)}),placeholder:'1234',type:'password'}),
      h('button',{onClick:finish,disabled:!step2Ok||busy,
        style:{width:'100%',padding:'13px',borderRadius:11,background:step2Ok?C.navy:'#E8E5DF',color:step2Ok?'#fff':C.muted,fontSize:14,fontWeight:600,cursor:step2Ok?'pointer':'not-allowed',border:'none'}},
        busy ? 'Création en cours...' : 'Créer mon compte ✓'),
      h('div',{onClick:()=>setStep(1),style:{textAlign:'center',fontSize:12,color:C.gold,cursor:'pointer',fontWeight:500,marginTop:12}},'← Retour')),

    h('div',{style:{textAlign:'center',marginTop:24}},
      h('div',{style:{fontSize:12,color:C.muted,marginBottom:6}},"Déjà un compte ?"),
      h('div',{onClick:goConnexion,style:{fontSize:13,color:C.gold,fontWeight:600,cursor:'pointer'}},'Se connecter →'))
  );
}

function SuperAdminPanel({user, onSelectAsm, onLogout}) {
  const [asms, setAsms] = useState([]);
  const [membres, setMembres] = useState([]);
  const [tab, setTab] = useState('assemblees');
  const [showNewAsm, setShowNewAsm] = useState(false);
  const [newAsm, setNewAsm] = useState({nom:'',numero:'',ville:'',departement:'',pays:'Bénin',langue:'Français'});
  const [showAddMbr, setShowAddMbr] = useState(false);
  const [addMbrAsm, setAddMbrAsm] = useState('');
  const [newMbr, setNewMbr] = useState({prenom:'',nom:'',username:'',tel:'',role:'assistant',pin:'1234'});
  const [busy, setBusy] = useState(false);

  useEffect(() => { loadAll(); }, []);
  const loadAll = async () => {
    const {data:a} = await sb.from('assemblees').select('*').order('nom');
    const {data:m} = await sb.from('membres').select('*').order('assemblee_id,prenom');
    setAsms(a||[]); setMembres(m||[]);
  };

  const createAsm = async () => {
    if (!newAsm.nom || !newAsm.numero || busy) return;
    setBusy(true);
    try {
      const a = await db.createAssemblee({...newAsm, numero: newAsm.numero.toUpperCase()});
      await db.insertDefaultArticles(a.id);
      setNewAsm({nom:'',numero:'',ville:'',departement:'',pays:'Bénin',langue:'Français'}); setShowNewAsm(false);
      await loadAll();
    } catch(e) { alert('Erreur: '+e.message); }
    setBusy(false);
  };

  const addMembre = async () => {
    if (!newMbr.prenom || !newMbr.nom || !newMbr.username || !addMbrAsm || busy) return;
    setBusy(true);
    try {
      await db.createMembre({...newMbr, username:newMbr.username.trim().toLowerCase(), assemblee_id:addMbrAsm});
      setNewMbr({prenom:'',nom:'',username:'',tel:'',role:'assistant',pin:'1234'}); setShowAddMbr(false);
      await loadAll();
    } catch(e) { alert('Erreur: '+e.message); }
    setBusy(false);
  };

  const tBtn = (id,l) => h('button',{onClick:()=>setTab(id),style:{flex:1,padding:'8px',borderRadius:7,border:'none',cursor:'pointer',fontSize:12,fontWeight:tab===id?600:400,background:tab===id?'#fff':'transparent',color:tab===id?C.navy:C.muted,boxShadow:tab===id?'0 1px 3px rgba(0,0,0,.08)':'none'}},l);

  return h('div',{style:{padding:'16px 14px 20px'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
      h('div',{style:{fontSize:10,color:C.danger,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase'}},'◆ SUPER ADMIN'),
      h('button',{onClick:onLogout,style:{padding:'4px 10px',borderRadius:6,background:'#FFF0EE',color:C.danger,fontSize:10,fontWeight:600,cursor:'pointer',border:'none'}},'Déconnexion')),
    h('div',{style:{fontSize:20,fontWeight:800,color:C.navy,marginBottom:4}},'Panneau d\'administration'),
    h('div',{style:{fontSize:12,color:C.muted,marginBottom:14}},user.prenom+' '+user.nom+' · Super Admin'),

    h('div',{style:{display:'flex',gap:8,marginBottom:14}},
      h('div',{style:{flex:1,background:'#fff',borderRadius:10,padding:'12px',border:'1px solid '+C.border,textAlign:'center'}},
        h('div',{style:{fontSize:24,fontWeight:700,color:C.navy}},asms.length),
        h('div',{style:{fontSize:10,color:C.muted}},'Assemblées')),
      h('div',{style:{flex:1,background:'#fff',borderRadius:10,padding:'12px',border:'1px solid '+C.border,textAlign:'center'}},
        h('div',{style:{fontSize:24,fontWeight:700,color:C.navy}},membres.length),
        h('div',{style:{fontSize:10,color:C.muted}},'Membres'))),

    h('div',{style:{display:'flex',background:'#E8E5DF',borderRadius:8,padding:3,marginBottom:14}},tBtn('assemblees','Assemblées'),tBtn('membres','Tous les membres')),

    tab==='assemblees' && h('div',null,
      h('button',{onClick:()=>setShowNewAsm(!showNewAsm),style:{width:'100%',padding:'10px',borderRadius:9,background:showNewAsm?'#E8E5DF':C.navy,color:showNewAsm?C.text:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',marginBottom:12}},showNewAsm?'Annuler':'+ Nouvelle assemblée'),
      showNewAsm && h('div',{style:{background:'#fff',borderRadius:12,padding:'14px',border:'1px solid '+C.border,marginBottom:12}},
        h(Inp,{label:"NOM *",value:newAsm.nom,onChange:v=>setNewAsm({...newAsm,nom:v})}),
        h(Inp,{label:"NUMÉRO * (XX0000)",value:newAsm.numero,onChange:v=>setNewAsm({...newAsm,numero:v.toUpperCase().slice(0,6)})}),
        h('div',{style:{display:'flex',gap:6}},
          h('div',{style:{flex:1}},h(Inp,{label:'VILLE',value:newAsm.ville,onChange:v=>setNewAsm({...newAsm,ville:v})})),
          h('div',{style:{flex:1}},h(Inp,{label:'PAYS',value:newAsm.pays,onChange:v=>setNewAsm({...newAsm,pays:v})}))),
        h('button',{onClick:createAsm,disabled:!newAsm.nom||!newAsm.numero||busy,style:{width:'100%',padding:'10px',borderRadius:8,background:newAsm.nom&&newAsm.numero?C.ok:'#E8E5DF',color:newAsm.nom&&newAsm.numero?'#fff':C.muted,fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}},busy?'Création...':'Créer l\'assemblée')),

            h('div',{style:{fontSize:10,color:C.muted}},(a.ville||'')+(a.departement?' · '+a.departement:'')+' · '+mCount+' membre(s)')),
          h('button',{onClick:()=>onSelectAsm(a),style:{padding:'6px 12px',borderRadius:7,background:C.gold,color:'#fff',fontSize:10,fontWeight:600,cursor:'pointer',border:'none'}},'Accéder →'));

    tab==='membres' && h('div',null,
      h('button',{onClick:()=>setShowAddMbr(!showAddMbr),style:{width:'100%',padding:'10px',borderRadius:9,background:showAddMbr?'#E8E5DF':C.navy,color:showAddMbr?C.text:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',marginBottom:12}},showAddMbr?'Annuler':'+ Ajouter un membre'),
      showAddMbr && h('div',{style:{background:'#fff',borderRadius:12,padding:'14px',border:'1px solid '+C.border,marginBottom:12}},
        h('div',{style:{marginBottom:11}},h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'ASSEMBLÉE *'),
          h(SearchSelect,{value:addMbrAsm,onChange:v=>setAddMbrAsm(v),placeholder:'Choisir...',
            options:asms.map(a=>({value:a.id,label:a.nom,sub:a.numero}))})),
        h(Inp,{label:'PRÉNOM *',value:newMbr.prenom,onChange:v=>setNewMbr({...newMbr,prenom:v})}),
        h(Inp,{label:'NOM *',value:newMbr.nom,onChange:v=>setNewMbr({...newMbr,nom:v})}),
        h(Inp,{label:"NOM D'UTILISATEUR *",value:newMbr.username,onChange:v=>setNewMbr({...newMbr,username:v.replace(/\s/g,'').toLowerCase()})}),
        h('div',{style:{display:'flex',gap:6}},
          h('div',{style:{flex:1}},h(Inp,{label:'PIN',value:newMbr.pin,onChange:v=>setNewMbr({...newMbr,pin:v.replace(/\D/g,'').slice(0,4)}),type:'password'})),
          h('div',{style:{flex:1}},h('div',{style:{marginBottom:11}},h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'RÔLE'),
            h('select',{value:newMbr.role,onChange:e=>setNewMbr({...newMbr,role:e.target.value}),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
              ...ROLES.map(r=>h('option',{key:r.id,value:r.id},r.label)))))),
        h('button',{onClick:addMembre,disabled:!newMbr.prenom||!newMbr.nom||!newMbr.username||!addMbrAsm||busy,style:{width:'100%',padding:'10px',borderRadius:8,background:(newMbr.prenom&&newMbr.nom&&newMbr.username&&addMbrAsm)?C.ok:'#E8E5DF',color:(newMbr.prenom&&newMbr.nom&&newMbr.username&&addMbrAsm)?'#fff':C.muted,fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}},busy?'...':'Ajouter')),
      ...asms.map(a => {
        const asmMbrs = membres.filter(m => m.assemblee_id===a.id);
        if (asmMbrs.length===0) return null;
        return h('div',{key:a.id,style:{marginBottom:12}},
          h('div',{style:{fontSize:12,fontWeight:700,color:C.navy,padding:'6px 0',borderBottom:'2px solid '+C.gold+'44',marginBottom:6}},a.nom+' ('+a.numero+')'),
          ...asmMbrs.map(m => h('div',{key:m.id,style:{background:'#fff',borderRadius:8,padding:'9px 12px',marginBottom:4,border:'1px solid '+C.border,display:'flex',alignItems:'center',gap:8}},
            h('div',{style:{width:32,height:32,borderRadius:16,background:m.actif!==false?C.navy:'#ccc',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700}},(m.prenom||'?')[0].toUpperCase()),
            h('div',{style:{flex:1}},
              h('div',{style:{fontSize:12,fontWeight:500,color:m.actif!==false?C.text:C.muted}},m.prenom+' '+m.nom),
              h('div',{style:{fontSize:10,color:C.muted}},roleLabel(m.role)+(m.username?' · @'+m.username:'')+(m.actif===false?' · Désactivé':''))),
            h('button',{onClick:async()=>{await db.updateMembre(m.id,{actif:m.actif===false?true:false});await loadAll();},style:{padding:'4px 8px',borderRadius:5,background:m.actif!==false?'#FFF0EE':'#EEF8F2',color:m.actif!==false?C.danger:C.ok,fontSize:9,fontWeight:600,cursor:'pointer',border:'none'}},m.actif!==false?'Désact.':'Activer'))));
      }).filter(Boolean))
  );
}

function Dashboard({arts,mvts,asm,user,setPage}) {
  const alerts = arts.filter(a => getSt(a) !== 'ok');
  const tot = arts.reduce((s,a) => s+a.stock, 0);

// PDF HELPERS
// ═══════════════════════════════════════
function genPDF(title, subtitle, headers, rows, filename) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF('p','mm','a4');
  doc.setFontSize(14); doc.setFont(undefined,'bold');
  doc.text(title, 105, 16, {align:'center'});
  doc.setFontSize(9); doc.setFont(undefined,'normal');
  doc.text(subtitle, 14, 25);
  doc.text('Date : '+new Date().toLocaleDateString('fr-FR'), 14, 30);
  doc.autoTable({startY:36, margin:{left:14,right:14}, head:[headers], body:rows,
    styles:{fontSize:8,cellPadding:2}, headStyles:{fillColor:[27,45,79],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,243,238]}});
  doc.setFontSize(7); doc.setFont(undefined,'italic');
  doc.text('Inventory · '+new Date().toLocaleString('fr-FR'), 105, 290, {align:'center'});
  const blob = doc.output('blob');
  if (navigator.share && navigator.canShare) {
    const file = new File([blob], filename, {type:'application/pdf'});
    try { if(navigator.canShare({files:[file]})){navigator.share({title:filename,files:[file]});return;} } catch(e){}
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function CommandesPage({arts, mvts, demandes, asmId, asm, user, onRefresh}) {
  const [tab, setTab] = useState('generer');
  const [cmds, setCmds] = useState([]);
  const [items, setItems] = useState([]);
  const [generated, setGenerated] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showNew, setShowNew] = useState(false);
  const [addId, setAddId] = useState('');
  const [addQty, setAddQty] = useState(1);
  const [nw, setNw] = useState({code:'',nom:'',sym:'',cat:'Bibles',quantite:1});
  const [expandedCmd, setExpandedCmd] = useState(null);
  const [cmdItems, setCmdItems] = useState({});
  const [busy, setBusy] = useState(false);
  // Inter
  const [interTab, setInterTab] = useState('recu');
  const [expandedInter, setExpandedInter] = useState(null);
  const [refuseId, setRefuseId] = useState(null);
  const [refuseReason, setRefuseReason] = useState('');
  const [interRecu, setInterRecu] = useState([]);
  const [interEnvoye, setInterEnvoye] = useState([]);
  const [allAsm, setAllAsm] = useState([]);
  const [showInterForm, setShowInterForm] = useState(false);
  const [interF, setInterF] = useState({to_id:'',code:'',nom:'',sym:'',quantite:1,notes:''});

  useEffect(() => { loadAll(); }, [tab, asmId]);
  const loadAll = async () => {
    try {
      const [c, aa] = await Promise.all([db.getCommandes(asmId), db.getAssemblees()]);
      setCmds(c); setAllAsm(aa);
      // Fetch ALL inter records and filter client-side (more reliable)
      const {data: allInter} = await sb.from('commandes_inter').select('*').order('created_at',{ascending:false});
      const inter = allInter || [];
      setInterRecu(inter.filter(r => r.to_assemblee_id === asmId));
      setInterEnvoye(inter.filter(r => r.from_assemblee_id === asmId));
    } catch(e) { console.error('loadAll:', e); }
  };

  const loadCmdItems = async (cmdId) => {
    if (cmdItems[cmdId]) { setExpandedCmd(expandedCmd===cmdId?null:cmdId); return; }
    const items = await db.getCommandeItems(cmdId);
    setCmdItems(prev => ({...prev, [cmdId]: items}));
    setExpandedCmd(cmdId);
  };

  const generate = () => {
    const suggestions = [];
    arts.forEach(a => {
      if (a.min_stock === 0) return;
      const moisMvts = mvts.filter(m => m.article_id===a.id && m.type==='sortie' && mKey(m.date)===nowM());
      const sortiesMois = moisMvts.reduce((s,m) => s+m.quantite, 0);
      const besoin = Math.max(a.min_stock * 2 - a.stock, sortiesMois * 3 - a.stock, 0);
      if (besoin > 0 || a.stock < a.min_stock) {
        suggestions.push({article_id:a.id, code:a.code, nom:a.nom, sym:a.sym||'', cat:a.cat, quantite:Math.max(besoin, a.min_stock), stock:a.stock});
      }
    });
    demandes.filter(d => d.statut==='en_attente').forEach(d => {
      const art = arts.find(a => a.id===d.article_id);
      if (!art) return;
      const ex = suggestions.find(s => s.article_id===d.article_id);
      if (ex) { ex.quantite += d.quantite; ex.is_special = true; ex.proclamateur = (ex.proclamateur ? ex.proclamateur+', ' : '') + d.proclamateur; }
      else { suggestions.push({article_id:art.id, code:art.code, nom:art.nom, sym:art.sym||'', cat:art.cat, quantite:d.quantite, stock:art.stock, is_special:true, proclamateur:d.proclamateur}); }
    });
    interRecu.filter(r => r.statut==='acceptee').forEach(r => {
      suggestions.push({article_id:null, code:r.code, nom:r.nom+' (pour autre assemblée)', sym:r.sym||'', cat:'', quantite:r.quantite, stock:0, is_inter:true});
    });
    // Separate into sections for clarity
    const stockItems = suggestions.filter(s => !s.is_special && !s.is_inter);
    const specialItems = suggestions.filter(s => s.is_special);
    const interItems = suggestions.filter(s => s.is_inter);
    const all = [];
    if (stockItems.length > 0) { all.push({_section:'Stock à réapprovisionner (' + stockItems.length + ')'}); all.push(...stockItems); }
    if (specialItems.length > 0) { all.push({_section:'Demandes spéciales des proclamateurs (' + specialItems.length + ')'}); all.push(...specialItems); }
    if (interItems.length > 0) { all.push({_section:'Demandes inter-assemblées (' + interItems.length + ')'}); all.push(...interItems); }
    setItems(all.length > 0 ? all : suggestions);
    setGenerated(true);
  };

  const addManual = () => {
    if (!addId) return;
    const art = arts.find(a => a.id===addId);
    if (!art) return;
    const ex = items.find(i => i.article_id===addId);
    if (ex) { setItems(items.map(i => i.article_id===addId ? {...i, quantite:i.quantite+(parseInt(addQty)||1)} : i)); }
    else { setItems([...items, {article_id:art.id, code:art.code, nom:art.nom, sym:art.sym||'', cat:art.cat, quantite:parseInt(addQty)||1, stock:art.stock}]); }
    setAddId(''); setAddQty(1); setShowAdd(false);
  };

  const addCustom = () => {
    if (!nw.code || !nw.nom) return;
    setItems([...items, {article_id:null, code:nw.code, nom:nw.nom, sym:nw.sym, cat:nw.cat, quantite:parseInt(nw.quantite)||1, stock:0, custom:true}]);
    setNw({code:'',nom:'',sym:'',cat:'Bibles',quantite:1}); setShowNew(false);
  };

  const saveCommande = async () => {
    if (items.length===0 || busy) return;
    setBusy(true);
    try {
      const cmd = await db.createCommande({assemblee_id:asmId, statut:'en_attente', notes:'Commande du '+new Date().toLocaleDateString('fr-FR')});
      const rows = items.filter(it => !it._section).map(it => ({commande_id:cmd.id, article_id:it.article_id, code:it.code, nom:it.nom, sym:it.sym||'', cat:it.cat||'', quantite:it.quantite, is_special:!!it.is_special, proclamateur:it.proclamateur||null}));
      await db.insertCommandeItems(rows);
      demandes.filter(d=>d.statut==='en_attente').forEach(async d => { await db.updateDemande(d.id,{statut:'commande'}); });
      setItems([]); setGenerated(false);
      await loadAll(); await onRefresh();
    } catch(e) { console.error(e); }
    setBusy(false);
  };

  const updateCmdStatut = async (id, statut) => { await db.updateCommande(id, {statut}); await loadAll(); };

  const exportPDF = () => {
    const sub = 'Assemblée : '+(asm.nom||'-')+'    N° : '+(asm.numero||'-')+'    Ville : '+(asm.ville||'-');

                h('div',{style:{fontSize:11,color:C.text,marginBottom:4}},h('strong',null,'Destinataire : '),(toAsm?toAsm.nom:'?')+(toAsm&&toAsm.numero?' ('+toAsm.numero+')':'')),
                h('div',{style:{fontSize:11,color:C.text,marginBottom:4}},h('strong',null,'Date : '),fmtD(r.date||r.created_at)),
                r.notes && h('div',{style:{fontSize:11,color:C.text,marginBottom:4}},h('strong',null,'Votre note : '),r.notes),
                r.raison_refus && h('div',{style:{fontSize:11,color:C.danger,background:C.danger+'08',padding:'6px 8px',borderRadius:6}},h('strong',null,'Raison du refus : '),r.raison_refus),
                r.statut==='en_attente' && h('div',{style:{fontSize:10,color:C.warn,fontStyle:'italic',marginTop:4}},'En attente de réponse de l\'assemblée destinataire.'),
                r.statut==='acceptee' && h('div',{style:{fontSize:10,color:C.ok,fontStyle:'italic',marginTop:4}},'Demande acceptée. L\'assemblée inclura cette publication dans sa commande.'))));
        })))
  );
}

// ═══════════════════════════════════════
// DEMANDES SPÉCIALES
// ═══════════════════════════════════════
function DemandesPage({arts, demandes, asmId, onRefresh}) {
  const [show, setShow] = useState(false);
  const [f, setF] = useState({proclamateur_prenom:'', proclamateur_nom:'', article_id:'', langue:'Français', quantite:1});
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!f.proclamateur_prenom || !f.proclamateur_nom || !f.article_id || busy) return;
    setBusy(true);
    try {
      await db.createDemande({assemblee_id:asmId, article_id:f.article_id, proclamateur:f.proclamateur_prenom+' '+f.proclamateur_nom, langue:f.langue, quantite:parseInt(f.quantite)||1});
      setF({proclamateur_prenom:'', proclamateur_nom:'', article_id:'', langue:'Français', quantite:1});
      setShow(false);
      await onRefresh();
    } catch(e) {}
    setBusy(false);
  };

  const updateStatut = async (id, statut) => { await db.updateDemande(id, {statut}); await onRefresh(); };

  const statutStyle = {en_attente:{bg:'#FFF4EE',c:C.warn,label:'En attente'}, commande:{bg:'#F0F4FF',c:C.navy,label:'Commandé'}, recu:{bg:'#EEF8F2',c:C.ok,label:'Reçu'}};

  return h('div',{style:{padding:'14px 14px 20px'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
      h('div',{style:{fontSize:18,fontWeight:700,color:C.navy}},'Demandes spéciales'),
      h('button',{onClick:()=>setShow(!show),style:{padding:'5px 11px',borderRadius:7,background:show?'#E8E5DF':C.navy,color:show?C.text:'#fff',fontSize:11,fontWeight:500,cursor:'pointer',border:'none'}},show?'Annuler':'+ Nouvelle')),

    show && h('div',{style:{background:'#fff',borderRadius:12,padding:'14px',border:'1px solid '+C.border,marginBottom:14}},
      h('div',{style:{display:'flex',gap:8}},
        h('div',{style:{flex:1}},h(Inp,{label:'PRÉNOM DU PROCLAMATEUR',value:f.proclamateur_prenom,onChange:v=>setF({...f,proclamateur_prenom:v}),placeholder:'Prénom'})),
        h('div',{style:{flex:1}},h(Inp,{label:'NOM',value:f.proclamateur_nom,onChange:v=>setF({...f,proclamateur_nom:v}),placeholder:'Nom'}))),
      h('div',{style:{marginBottom:11}},
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'PUBLICATION'),
        h(SearchSelect,{value:f.article_id,onChange:v=>setF({...f,article_id:v}),placeholder:'Rechercher une publication...',
          options:arts.map(a=>({value:a.id,label:a.code+' — '+a.nom,sub:a.cat}))})),
      h('div',{style:{display:'flex',gap:8}},
        h('div',{style:{flex:1}},
          h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'QUANTITÉ'),
          h('input',{type:'number',value:f.quantite,onChange:e=>setF({...f,quantite:Math.max(1,parseInt(e.target.value)||1)}),min:1,style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',textAlign:'center'}})),
        h('div',{style:{flex:1}},
          h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:4}},'LANGUE'),
          h('select',{value:f.langue,onChange:e=>setF({...f,langue:e.target.value}),style:{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid '+C.border,fontSize:12,outline:'none',background:'#fff'}},
            ...LANGUES.map(l=>h('option',{key:l,value:l},l))))),
      h('button',{onClick:submit,disabled:!f.proclamateur_prenom||!f.proclamateur_nom||!f.article_id||busy,
        style:{width:'100%',padding:'10px',borderRadius:9,marginTop:4,background:(f.proclamateur_prenom&&f.proclamateur_nom&&f.article_id)?C.gold:'#E8E5DF',color:(f.proclamateur_prenom&&f.proclamateur_nom&&f.article_id)?'#fff':C.muted,fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}},
        busy?'Enregistrement...':'Enregistrer la demande')),

    demandes.length===0 && !show && h('div',{style:{textAlign:'center',padding:'30px',color:C.muted}},
      h('div',{style:{fontSize:36,marginBottom:8}},'⭐'),
      h('div',{style:{fontSize:13}},'Aucune demande spéciale enregistrée.')),

    ...demandes.map(d => {
      const art = arts.find(a=>a.id===d.article_id);
      const st = statutStyle[d.statut] || statutStyle.en_attente;
      return h('div',{key:d.id,style:{background:'#fff',borderRadius:10,padding:'11px 14px',marginBottom:6,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
          h('div',{style:{fontSize:13,fontWeight:600,color:C.text}},d.proclamateur),
          h('span',{style:{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:st.bg,color:st.c}},st.label)),
        h('div',{style:{fontSize:11,color:C.muted}},
          (art?art.code+' — '+art.nom:'?')+' × '+d.quantite+(d.langue&&d.langue!=='Français'?' · '+d.langue:'')),
        h('div',{style:{fontSize:10,color:C.muted,marginTop:2}},fmtD(d.date||d.created_at)),
        h('div',{style:{display:'flex',gap:4,marginTop:6}},
          d.statut==='en_attente' && h('button',{onClick:()=>updateStatut(d.id,'commande'),style:{padding:'4px 10px',borderRadius:6,background:C.navy+'11',color:C.navy,fontSize:10,fontWeight:500,cursor:'pointer',border:'1px solid '+C.navy+'22'}},'→ Commandé'),
          d.statut==='commande' && h('button',{onClick:()=>updateStatut(d.id,'recu'),style:{padding:'4px 10px',borderRadius:6,background:C.ok+'11',color:C.ok,fontSize:10,fontWeight:500,cursor:'pointer',border:'1px solid '+C.ok+'22'}},'→ Reçu')));
    })
  );
}

// ═══════════════════════════════════════
// MODAL ARTICLE
// ═══════════════════════════════════════
function ModalArticle({art,user,mvts,onClose,onRefresh}) {
  const canMod = hasPerm(user.role,'mod_stock',user.perms);
  const [tab,setTab] = useState(canMod?'stock':'history');
  const [es,setEs] = useState(art.stock);
  const [em,setEm] = useState(art.min_stock);
  const s = getSt(art); const {c,bg} = stStyle(s);
  const artMvts = mvts.filter(m=>m.article_id===art.id).slice(0,8);

  const saveStock = async () => {
    await db.updateArticle(art.id, {stock:Math.max(0,es), min_stock:Math.max(0,em)});
    await onRefresh();
    onClose();
  };

  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:100,display:'flex',alignItems:'flex-end'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:C.bg,borderRadius:'18px 18px 0 0',width:'100%',maxWidth:430,margin:'0 auto',maxHeight:'80vh',overflow:'auto',padding:'16px 14px 28px'}},
      h('div',{style:{width:32,height:4,background:C.border,borderRadius:2,margin:'0 auto 14px'}}),
      h('div',{style:{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14}},
        h('div',{style:{minWidth:44,height:44,borderRadius:9,background:bg,display:'flex',alignItems:'center',justifyContent:'center'}},h('span',{style:{fontSize:9,color:c,fontWeight:700}},art.code)),
        h('div',{style:{flex:1}},h('div',{style:{fontSize:15,fontWeight:700,color:C.text}},art.nom),h('div',{style:{fontSize:11,color:C.muted,marginTop:2}},art.sym+' · '+art.cat)),
        h('span',{onClick:onClose,style:{cursor:'pointer',color:C.muted,fontSize:18}},'✕')),
      // Stats
      h('div',{style:{background:'#fff',borderRadius:11,padding:'13px',marginBottom:13,border:'1px solid '+c+'33',display:'flex',alignItems:'center'}},
        h('div',{style:{textAlign:'center',flex:1}},h('div',{style:{fontSize:34,fontWeight:800,color:c}},art.stock),h('div',{style:{fontSize:10,color:C.muted}},'en stock')),
        h('div',{style:{width:1,background:C.border,alignSelf:'stretch'}}),
        h('div',{style:{textAlign:'center',flex:1}},h('div',{style:{fontSize:20,fontWeight:600,color:C.muted}},art.min_stock),h('div',{style:{fontSize:10,color:C.muted}},"seuil d'alerte")),
        h('div',{style:{width:1,background:C.border,alignSelf:'stretch'}}),
        h('div',{style:{textAlign:'center',flex:1}},h(Badge,{s}))),
      // Tabs
      h('div',{style:{display:'flex',background:'#E8E5DF',borderRadius:7,padding:2,marginBottom:12}},
        ...(canMod ? [['stock','Modifier'],['history','Historique']] : [['history','Historique']]).map(([t,l])=>
          h('button',{key:t,onClick:()=>setTab(t),style:{flex:1,padding:'7px',borderRadius:5,border:'none',cursor:'pointer',fontSize:11,fontWeight:500,background:tab===t?'#fff':'transparent',color:tab===t?C.navy:C.muted}},l))),
      tab==='stock' && h('div',null,
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:7}},'STOCK'),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14}},
          h('button',{onClick:()=>setEs(Math.max(0,es-1)),style:{width:42,height:42,borderRadius:9,background:'#fff',border:'1px solid '+C.border,fontSize:18,cursor:'pointer'}},'−'),
          h('input',{type:'number',value:es,onChange:e=>setEs(Math.max(0,parseInt(e.target.value)||0)),style:{flex:1,textAlign:'center',padding:'9px',borderRadius:9,border:'1px solid '+C.border,fontSize:20,fontWeight:700,color:C.navy,outline:'none'}}),
          h('button',{onClick:()=>setEs(es+1),style:{width:42,height:42,borderRadius:9,background:C.navy,border:'none',color:'#fff',fontSize:18,cursor:'pointer'}},'+') ),
        h('label',{style:{fontSize:11,color:C.muted,fontWeight:600,display:'block',marginBottom:7}},"SEUIL D'ALERTE"),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14}},
          h('button',{onClick:()=>setEm(Math.max(0,em-1)),style:{width:42,height:42,borderRadius:9,background:'#fff',border:'1px solid '+C.border,fontSize:18,cursor:'pointer'}},'−'),
          h('input',{type:'number',value:em,onChange:e=>setEm(Math.max(0,parseInt(e.target.value)||0)),style:{flex:1,textAlign:'center',padding:'9px',borderRadius:9,border:'1px solid '+C.border,fontSize:18,fontWeight:600,color:C.gold,outline:'none'}}),
          h('button',{onClick:()=>setEm(em+1),style:{width:42,height:42,borderRadius:9,background:C.gold+'22',border:'1px solid '+C.gold+'44',color:C.gold,fontSize:18,cursor:'pointer'}},'+') ),
        h('button',{onClick:saveStock,style:{width:'100%',padding:'12px',borderRadius:10,background:C.navy,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',border:'none'}},'Enregistrer')),
      tab==='history' && h('div',null,
        artMvts.length===0 ? h('div',{style:{textAlign:'center',padding:'20px',color:C.muted,fontSize:12}},'Aucun mouvement')
        : artMvts.map(m => h('div',{key:m.id,style:{background:'#fff',borderRadius:8,padding:'8px 11px',marginBottom:5,display:'flex',alignItems:'center',gap:8,border:'1px solid '+C.border}},
          h('div',{style:{width:26,height:26,borderRadius:6,background:m.type==='sortie'?'#FFF4EE':'#EEF8F2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}},m.type==='sortie'?'↓':'↑'),
          h('div',{style:{flex:1}},h('div',{style:{fontSize:11,fontWeight:500,color:C.text}},m.type==='sortie'?'Sortie':'Réception'),h('div',{style:{fontSize:10,color:C.muted}},fmtD(m.date)+(m.personne?' · '+m.personne:''))),
          h('span',{style:{fontSize:13,fontWeight:700,color:m.type==='sortie'?C.warn:C.ok}},(m.type==='sortie'?'-':'+')+m.quantite))))
  ));
}

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function Nav({page,setPage,alertCount}) {
  const items = [{id:'dashboard',icon:'⌂',label:'Accueil'},{id:'stock',icon:'▣',label:'Stock'},{id:'mouvement',icon:'⇅',label:'Mouv.'},{id:'commandes',icon:'▦',label:'Cmd.'},{id:'demandes',icon:'☆',label:'Spécial'},{id:'inventaire',icon:'▤',label:'Invent.'},{id:'settings',icon:'⚙',label:'Régl.'}];
  return h('div',{style:{position:'sticky',bottom:0,background:'#fff',borderTop:'1px solid '+C.border,display:'flex',padding:'7px 0 10px',zIndex:50}},
    ...items.map(({id,icon,label}) => {
      const active = page===id;
      const badge = id==='stock' && alertCount>0;
      return h('button',{key:id,onClick:()=>setPage(id),style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'2px 0'}},
        h('div',{style:{position:'relative'}},
          h('span',{style:{fontSize:18,color:active?C.navy:C.muted,lineHeight:1}},icon),
          badge && h('span',{style:{position:'absolute',top:-5,right:-5,width:13,height:13,background:C.danger,borderRadius:'50%',fontSize:7,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}},alertCount)),
        h('span',{style:{fontSize:8,color:active?C.navy:C.muted,fontWeight:active?700:400}},label));
    }));
}

// ═══════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════
function App() {
  const [screen,setScreen] = useState('loading'); // loading | onboarding | login | main
  const [page,setPage] = useState('dashboard');
  const [user,setUser] = useState(null);
  const [asm,setAsm] = useState(null);
  const [membres,setMembres] = useState([]);
  const [arts,setArts] = useState([]);
  const [mvts,setMvts] = useState([]);
  const [modal,setModal] = useState(null);
  const [demandes,setDemandes] = useState([]);
  const [saMode,setSaMode] = useState(false);

  const loadData = useCallback(async (asmId) => {
    const [a, m, ar, mv, dm] = await Promise.all([
      sb.from('assemblees').select('*').eq('id',asmId).single(),
      db.getMembres(asmId),
      db.getArticles(asmId),
      db.getMouvements(asmId, 200),
      db.getDemandes(asmId)
    ]);
    if (a.data) setAsm(a.data);
    setMembres(m); setArts(ar); setMvts(mv); setDemandes(dm);
  }, []);

  const refresh = useCallback(async () => {
    if (asm) await loadData(asm.id);
  }, [asm, loadData]);

  // Init
  useEffect(() => {
    (async () => {
      try {
        const session = db.getSession();
        if (session && session.membre_id) {
          const membre = await db.getMembre(session.membre_id);
          if (membre && membre.actif !== false) {
            setUser(membre);
            if (membre.role === 'superadmin') {
              setSaMode(true);
              setScreen('main');
            } else {
              await loadData(session.assemblee_id);
              setScreen('main');
            }
            return;
          }
        }
        setScreen('auth');
      } catch(e) {
        console.error('Init error:', e);
        setScreen('auth');
      }
    })();
  }, []);

  const handleLogin = async (membre) => {
    setUser(membre);
    if (membre.role === 'superadmin') {
      setSaMode(true);
      setScreen('main');
    } else {
      await loadData(membre.assemblee_id);
      setScreen('main');
    }
  };

  const handleLogout = () => {
    db.clearSession();
    setUser(null);
    setSaMode(false);
    setScreen('auth');
  };

  const alerts = arts.filter(a => getSt(a) !== 'ok');

  if (screen === 'loading') {
    return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:C.bg}},
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:'2px',marginBottom:4}},'◆ INVENTORY'),
        h('div',{style:{fontSize:12,color:C.muted}},'Connexion à la base de données...')));
  }

  if (screen === 'auth') {
    return h(AuthScreen,{onLogin:handleLogin});
  }

  // MAIN
  if (saMode && user && user.role === 'superadmin') {
    const saSelectAsm = async (a) => {
      await loadData(a.id);
      setSaMode(false);
    };
    return h('div',{className:'app-shell',style:{display:'flex',flexDirection:'column',minHeight:'100vh'}},
      h('div',{style:{flex:1,overflowY:'auto'}},
        h(SuperAdminPanel,{user,onSelectAsm:saSelectAsm,onLogout:handleLogout})));
  }

  return h('div',{className:'app-shell',style:{display:'flex',flexDirection:'column'}},
    h('div',{style:{flex:1,overflowY:'auto'}},
      page==='dashboard' && h(Dashboard,{arts,mvts,asm,user,setPage:p=>{if(p==='_back_sa'){setSaMode(true);return;}setPage(p);}}),
      page==='stock' && h(StockPage,{arts,onArt:setModal}),
      page==='mouvement' && h(MouvementPage,{arts,mvts,asmId:asm.id,user,onRefresh:refresh}),
      page==='inventaire' && h(InventairePage,{arts,mvts,asm}),
      page==='commandes' && h(CommandesPage,{arts,mvts,demandes,asmId:asm.id,asm,user,onRefresh:refresh}),
      page==='demandes' && h(DemandesPage,{arts,demandes,asmId:asm.id,onRefresh:refresh}),
      page==='settings' && h(SettingsPage,{asm,user,membres,arts,asmId:asm.id,onRefresh:refresh,onLogout:handleLogout})),
    h(Nav,{page,setPage:p=>{if(p==='_back_sa'){setSaMode(true);return;}setPage(p);},alertCount:alerts.length}),
    modal && h(ModalArticle,{art:modal,user,mvts,onClose:()=>setModal(null),onRefresh:refresh})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
</body>
</html>
